<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Points Table 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --gold:#FFB800;--gold-light:#FFD860;--dark:#07070f;
  --card-bg:#10101c;--surface:#16162a;--border:rgba(255,184,0,0.15);
  --text:#e8e8f0;--muted:#5a5a7a;--red:#ff4444;--green:#32dc96;--blue:#50a0ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 50% at 15% 10%,rgba(255,184,0,.07) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 85% 85%,rgba(80,160,255,.05) 0%,transparent 60%);
pointer-events:none;z-index:0;}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:52px 44px;width:100%;max-width:420px;text-align:center;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(255,184,0,.12),transparent 70%);pointer-events:none;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:58px;letter-spacing:5px;background:linear-gradient(135deg,var(--gold-light),var(--gold),#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.login-sub{font-size:11px;letter-spacing:5px;color:var(--muted);margin-bottom:36px;text-transform:uppercase;}
.login-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;margin-bottom:12px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),#ff9500);color:#000;border:none;border-radius:10px;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-err{color:var(--red);font-size:13px;margin-top:12px;letter-spacing:1px;min-height:20px;}

/* HEADER */
#app{display:none;position:relative;z-index:1;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(16,16,28,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-sub{font-size:9px;letter-spacing:3px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:10px;}
.header-user{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold);letter-spacing:1px;}
.logout-btn{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red);border-radius:8px;padding:7px 14px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;}

/* NAV TABS */
.nav-tabs{display:flex;background:rgba(16,16,28,.95);border-bottom:1px solid var(--border);padding:0 24px;}
.nav-tab{padding:14px 24px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab:hover{color:var(--text);}

.main{max-width:900px;margin:0 auto;padding:28px 20px;}
.panel{display:none;}
.panel.active{display:block;}

/* ADMIN */
#admin-section{background:var(--card-bg);border:1px solid rgba(255,184,0,.3);border-radius:16px;padding:22px;margin-bottom:28px;}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);margin-bottom:16px;}
.admin-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.admin-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;flex:1;min-width:160px;}
.admin-input:focus{border-color:var(--gold);}
.admin-btn{background:linear-gradient(135deg,var(--gold),#ff9500);color:#000;border:none;border-radius:8px;padding:11px 22px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;white-space:nowrap;}
.admin-btn.red{background:linear-gradient(135deg,#ff4444,#cc2222);color:#fff;}
.pts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px;}
.pts-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.pts-label{font-size:13px;font-weight:700;color:var(--text);flex:1;letter-spacing:1px;}
.pts-input{width:70px;background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Orbitron',monospace;font-size:13px;outline:none;text-align:center;}
.pts-input:focus{border-color:var(--gold);}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.admin-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;outline:none;flex:1;}

/* MY POINTS */
.my-pts-card{background:var(--card-bg);border:1px solid rgba(255,184,0,.3);border-radius:16px;padding:28px;margin-bottom:20px;text-align:center;}
.my-pts-team{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--text);margin-bottom:4px;}
.my-pts-big{font-family:'Orbitron',monospace;font-size:72px;font-weight:900;color:var(--gold);line-height:1;margin:12px 0;}
.my-pts-sub{font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:20px;}
.my-rank-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);}
.mh-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--muted);margin:20px 0 12px;}
.mh-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.mh-name{font-size:14px;font-weight:700;color:var(--text);}
.mh-date{font-size:11px;color:var(--muted);margin-top:2px;}
.mh-pts{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;}
.mh-pts.pos{color:var(--green);}
.mh-pts.zero{color:var(--muted);}

/* LEADERBOARD */
.lb-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;transition:transform .15s;margin-bottom:10px;}
.lb-card:hover{transform:translateY(-1px);}
.lb-card.r1{border-color:rgba(255,184,0,.5);background:linear-gradient(135deg,rgba(255,184,0,.07),var(--card-bg));}
.lb-card.r2{border-color:rgba(192,192,192,.35);}
.lb-card.r3{border-color:rgba(205,127,50,.35);}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:38px;width:46px;text-align:center;flex-shrink:0;line-height:1;}
.r1 .lb-rank{color:var(--gold);}
.r2 .lb-rank{color:#c0c0c0;}
.r3 .lb-rank{color:#cd7f32;}
.lb-rank.other{color:var(--muted);font-size:28px;}
.lb-medal{font-size:26px;flex-shrink:0;}
.lb-info{flex:1;}
.lb-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;}
.lb-meta{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.lb-pts{text-align:right;flex-shrink:0;}
.lb-pts-num{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:var(--gold);line-height:1;}
.lb-pts-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);}
.lb-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.04);}
.lb-bar-fill{height:3px;border-radius:2px;transition:width .8s ease;}

.empty{text-align:center;padding:48px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty-msg{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 24px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;z-index:9999;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.green{border-color:rgba(50,220,150,.4);color:var(--green);}
.toast.red{border-color:rgba(255,68,68,.4);color:var(--red);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">IPL</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--text);margin-top:-8px;">POINTS TABLE</div>
    <div class="login-sub">2025 · Live Rankings</div>
    <input class="login-input" id="login-id" placeholder="Team ID (e.g. team1)" autocomplete="off"/>
    <input class="login-input" id="login-pass" type="password" placeholder="Password"/>
    <button class="login-btn" onclick="doLogin()">ENTER</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">IPL POINTS</div>
      <div class="header-sub">2025 · LIVE RANKINGS</div>
    </div>
    <div class="header-right">
      <div class="header-user" id="header-user">—</div>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-btn-mypoints" onclick="showTab('mypoints')">⭐ MY POINTS</div>
    <div class="nav-tab" id="tab-btn-leaderboard" onclick="showTab('leaderboard')">🏆 LEADERBOARD</div>
  </div>

  <div class="main">
    <div id="admin-section" style="display:none;">
      <div class="admin-title">⚙️ ADD MATCH POINTS</div>
      <div class="admin-row">
        <input class="admin-input" id="match-name" placeholder="Match name (e.g. MI vs CSK — Match 1)"/>
        <input class="admin-input" id="match-date" type="date" style="max-width:180px;"/>
      </div>
      <div class="pts-grid" id="pts-inputs"></div>
      <button class="admin-btn" onclick="adminAddMatch()">➕ SAVE MATCH POINTS</button>
      <hr class="divider"/>
      <div style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;">DELETE A MATCH</div>
      <div class="admin-row">
        <select class="admin-select" id="delete-match-sel"></select>
        <button class="admin-btn red" onclick="adminDeleteMatch()">🗑 DELETE</button>
      </div>
    </div>

    <div class="panel active" id="panel-mypoints"></div>
    <div class="panel" id="panel-leaderboard"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyCBOS32r3W9kI8zCYZR40tyZL0-3cLp2-8",authDomain:"ipl-auction-a620b.firebaseapp.com",databaseURL:"https://ipl-auction-a620b-default-rtdb.firebaseio.com",projectId:"ipl-auction-a620b",storageBucket:"ipl-auction-a620b.firebasestorage.app",messagingSenderId:"632282316728",appId:"1:632282316728:web:fe59d5b04bd830bf93d94d"};
const ADMIN_CREDS={id:'admin',pass:'ipl@admin2025'};
const DEFAULT_TEAMS={team1:{name:'TEAM ALPHA',pass:'team1pass'},team2:{name:'TEAM BRAVO',pass:'team2pass'},team3:{name:'TEAM CHARLIE',pass:'team3pass'},team4:{name:'TEAM DELTA',pass:'team4pass'},team5:{name:'TEAM ECHO',pass:'team5pass'}};
const MEDALS=['🥇','🥈','🥉'];
const RANK_COLORS=['#FFB800','#c0c0c0','#cd7f32','#50a0ff','#a050ff'];

let db=null,currentUser=null,isAdmin=false;
let teamsData=JSON.parse(JSON.stringify(DEFAULT_TEAMS));
let matchesData={},listeners=[];

function initFirebase(){
  try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();return true;}
  catch(e){console.error(e);return false;}
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-id').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});

async function doLogin(){
  const id=document.getElementById('login-id').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!id||!pass){err.textContent='Please enter ID and password.';return;}
  if(id===ADMIN_CREDS.id&&pass===ADMIN_CREDS.pass){
    currentUser='admin';isAdmin=true;
    if(!initFirebase()){err.textContent='Database connection failed.';currentUser=null;isAdmin=false;return;}
    launchApp();return;
  }
  if(!initFirebase()){err.textContent='Database connection failed.';return;}
  try{
    const snap=await db.ref('/teams/'+id).get();
    if(snap.exists()){
      const t=snap.val();
      const vp=t.pass||DEFAULT_TEAMS[id]?.pass;
      if(vp===pass){currentUser=id;isAdmin=false;launchApp();return;}
      err.textContent='Incorrect password.';
    } else {
      if(DEFAULT_TEAMS[id]&&DEFAULT_TEAMS[id].pass===pass){currentUser=id;isAdmin=false;launchApp();return;}
      err.textContent='Team ID not found.';
    }
  }catch(e){
    if(DEFAULT_TEAMS[id]&&DEFAULT_TEAMS[id].pass===pass){currentUser=id;isAdmin=false;launchApp();return;}
    err.textContent='Connection error. Try again.';
  }
}

function doLogout(){
  listeners.forEach(fn=>fn());listeners=[];
  currentUser=null;isAdmin=false;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-id').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('admin-section').style.display='none';
}

function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  if(isAdmin)document.getElementById('admin-section').style.display='block';
  db.ref('/teams').get().then(snap=>{
    if(snap.exists()){
      const t=snap.val();
      Object.keys(DEFAULT_TEAMS).forEach(id=>{
        if(t[id]?.name)teamsData[id]={...DEFAULT_TEAMS[id],name:t[id].name,pass:t[id].pass||DEFAULT_TEAMS[id].pass};
      });
    }
    document.getElementById('header-user').textContent=isAdmin?'👑 ADMIN':(teamsData[currentUser]?.name||currentUser.toUpperCase());
    renderPtsInputs();
    setupListener();
  }).catch(()=>{
    document.getElementById('header-user').textContent=isAdmin?'👑 ADMIN':(teamsData[currentUser]?.name||currentUser.toUpperCase());
    renderPtsInputs();
    setupListener();
  });
}

function setupListener(){
  const ref=db.ref('/points');
  const off=ref.on('value',snap=>{
    matchesData=snap.exists()?snap.val():{};
    renderAll();
  });
  listeners.push(()=>ref.off('value',off));
}

function renderAll(){renderMyPoints();renderLeaderboard();renderDeleteMatchSelect();}

function showTab(key){
  ['mypoints','leaderboard'].forEach(k=>{
    document.getElementById('tab-btn-'+k).classList.toggle('active',k===key);
    document.getElementById('panel-'+k).classList.toggle('active',k===key);
  });
}

function calcTotals(){
  const totals={};
  Object.keys(teamsData).forEach(id=>totals[id]=0);
  Object.values(matchesData).forEach(m=>{
    Object.entries(m.points||{}).forEach(([id,pts])=>{if(totals[id]!==undefined)totals[id]+=pts;});
  });
  return totals;
}

function renderMyPoints(){
  const el=document.getElementById('panel-mypoints');
  if(!el)return;
  const totals=calcTotals();
  const sorted=Object.keys(teamsData).sort((a,b)=>totals[b]-totals[a]);
  const matches=Object.entries(matchesData).sort((a,b)=>b[1].timestamp-a[1].timestamp);

  if(isAdmin){
    let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">';
    sorted.forEach((id,i)=>{
      const t=teamsData[id];
      html+=`<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;">
        <div style="font-size:22px;margin-bottom:6px;">${MEDALS[i]||'#'+(i+1)}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;">${t.name||id.toUpperCase()}</div>
        <div style="font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--gold);margin:6px 0;">${totals[id]}</div>
        <div style="font-size:9px;letter-spacing:2px;color:var(--muted);">POINTS</div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;return;
  }

  const myPts=totals[currentUser]||0;
  const myRank=sorted.indexOf(currentUser)+1;
  const team=teamsData[currentUser];

  let html=`<div class="my-pts-card">
    <div class="my-pts-team">${team?.name||currentUser.toUpperCase()}</div>
    <div class="my-pts-big">${myPts}</div>
    <div class="my-pts-sub">TOTAL POINTS</div>
    <div class="my-rank-badge">${MEDALS[myRank-1]||'#'+myRank}&nbsp; RANK ${myRank} OF ${Object.keys(teamsData).length}</div>
  </div>
  <div class="mh-title">📋 MATCH HISTORY (${matches.length})</div>`;

  if(!matches.length){
    html+=`<div class="empty"><div class="empty-icon">🏏</div><div class="empty-msg">NO MATCHES YET</div></div>`;
  } else {
    matches.forEach(([id,m],idx)=>{
      const pts=(m.points||{})[currentUser]||0;
      html+=`<div class="mh-row">
        <div><div class="mh-name">${m.name}</div><div class="mh-date">${m.date||''} · Match ${matches.length-idx}</div></div>
        <div class="mh-pts ${pts>0?'pos':'zero'}">${pts>0?'+'+pts:'—'}</div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

function renderLeaderboard(){
  const el=document.getElementById('panel-leaderboard');
  if(!el)return;
  const totals=calcTotals();
  const matchCount={};
  Object.keys(teamsData).forEach(id=>matchCount[id]=0);
  Object.values(matchesData).forEach(m=>{
    Object.entries(m.points||{}).forEach(([id,pts])=>{if(pts>0&&matchCount[id]!==undefined)matchCount[id]++;});
  });
  const sorted=Object.keys(teamsData).sort((a,b)=>totals[b]-totals[a]);
  const maxPts=Math.max(1,...Object.values(totals));
  const totalMatches=Object.keys(matchesData).length;
  let html='';
  sorted.forEach((id,i)=>{
    const rank=i+1;
    const team=teamsData[id];
    const pts=totals[id];
    const pct=Math.round((pts/maxPts)*100);
    const rClass=rank<=3?'r'+rank:'';
    const color=RANK_COLORS[i]||'var(--muted)';
    const isMe=id===currentUser;
    html+=`<div class="lb-card ${rClass}" style="${isMe?'box-shadow:0 0 0 2px rgba(255,184,0,.5);':''}">
      <div class="lb-rank ${rank>3?'other':''}">${rank}</div>
      ${rank<=3?`<div class="lb-medal">${MEDALS[i]}</div>`:'<div style="width:26px"></div>'}
      <div class="lb-info">
        <div class="lb-name">${team?.name||id.toUpperCase()}${isMe?' <span style="font-size:11px;color:var(--gold);">(YOU)</span>':''}</div>
        <div class="lb-meta">${matchCount[id]} match${matchCount[id]!==1?'es':''} scored · ${totalMatches} total</div>
      </div>
      <div class="lb-pts"><div class="lb-pts-num">${pts}</div><div class="lb-pts-lbl">POINTS</div></div>
      <div class="lb-bar"><div class="lb-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  });
  el.innerHTML=html||`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-msg">NO MATCHES YET</div></div>`;
}

function renderPtsInputs(){
  const el=document.getElementById('pts-inputs');
  if(!el)return;
  el.innerHTML=Object.entries(teamsData).map(([id,t])=>`
    <div class="pts-item">
      <div class="pts-label">${t.name||id.toUpperCase()}</div>
      <input class="pts-input" id="pts-${id}" type="number" min="0" step="1" placeholder="0"/>
    </div>`).join('');
}

async function adminAddMatch(){
  if(!isAdmin)return;
  const name=document.getElementById('match-name').value.trim();
  const date=document.getElementById('match-date').value;
  if(!name){toast('Enter a match name','red');return;}
  const pts={};let any=false;
  Object.keys(teamsData).forEach(id=>{const v=parseInt(document.getElementById('pts-'+id)?.value||'0')||0;pts[id]=v;if(v>0)any=true;});
  if(!any){toast('Enter points for at least one team','red');return;}
  try{
    await db.ref('/points/match_'+Date.now()).set({name,date:date||new Date().toISOString().split('T')[0],points:pts,timestamp:Date.now()});
    toast('✅ Match saved!','green');
    document.getElementById('match-name').value='';
    document.getElementById('match-date').value='';
    Object.keys(teamsData).forEach(id=>{const e=document.getElementById('pts-'+id);if(e)e.value='';});
  }catch(e){toast('Failed: '+e.message,'red');}
}

function renderDeleteMatchSelect(){
  const sel=document.getElementById('delete-match-sel');
  if(!sel)return;
  const m=Object.entries(matchesData).sort((a,b)=>b[1].timestamp-a[1].timestamp);
  sel.innerHTML=m.length?m.map(([id,v])=>`<option value="${id}">${v.name} (${v.date})</option>`).join(''):'<option>No matches yet</option>';
}

async function adminDeleteMatch(){
  if(!isAdmin)return;
  const id=document.getElementById('delete-match-sel')?.value;
  if(!id||!matchesData[id]){toast('Select a match','red');return;}
  if(!confirm('Delete "'+matchesData[id].name+'"?'))return;
  try{await db.ref('/points/'+id).remove();toast('Deleted','red');}
  catch(e){toast('Failed: '+e.message,'red');}
}

let toastT=null;
function toast(msg,type='green'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
